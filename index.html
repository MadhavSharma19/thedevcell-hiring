<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MERN MCQ Test</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    margin: 0;
    padding: 20px;
}

.container {
    max-width: 900px;
    margin: auto;
}

button {
    padding: 12px 20px;
    border: none;
    background: #22c55e;
    color: white;
    font-size: 16px;
    cursor: pointer;
    border-radius: 8px;
}

.question {
    margin-bottom: 20px;
    padding: 15px;
    background: #1e293b;
    border-radius: 10px;
}

.hidden {
    display: none;
}
</style>

</head>

<body>

<div class="container">

<h1>MERN MCQ Test</h1>

<button onclick="startExam()">Start Test</button>

<p id="warningBox">Warnings Left: 3</p>

<form id="quizForm" class="hidden"></form>

<div id="result" class="hidden"></div>

</div>

<script>
// ================= QUESTIONS =================
const questions = [
["HTML stands for?",["A","B","C","D"]],
["Hyperlink tag?",["A","B","C","D"]],
["Image tag?",["A","B","C","D"]],
["Image path attribute?",["A","B","C","D"]],
["List item tag?",["A","B","C","D"]],
["Largest heading?",["A","B","C","D"]],
["Correct HTML structure?",["A","B","C","D"]],
["Form tag?",["A","B","C","D"]],
["Password input type?",["A","B","C","D"]],
["Table row tag?",["A","B","C","D"]],
["CSS stands for?",["A","B","C","D"]],
["Text color property?",["A","B","C","D"]],
["ID selector?",["A","B","C","D"]],
["Background color?",["A","B","C","D"]],
["Text size property?",["A","B","C","D"]],
["1D layout?",["A","B","C","D"]],
["Responsive tool?",["A","B","C","D"]],
["Default position?",["A","B","C","D"]],
["Inner spacing?",["A","B","C","D"]],
["Relative unit?",["A","B","C","D"]],
["Variable keyword?",["A","B","C","D"]],
["JS comment?",["A","B","C","D"]],
["Select by id?",["A","B","C","D"]],
["typeof 'Hello'?",["A","B","C","D"]],
["Console output?",["A","B","C","D"]],
["Click event?",["A","B","C","D"]],
["Array syntax?",["A","B","C","D"]],
["Strict equality?",["A","B","C","D"]],
["DOM stands for?",["A","B","C","D"]],
["Add to array?",["A","B","C","D"]]
];

// ================= ANSWERS =================
const answers = [
"B","B","A","B","B","C","B","A","B","C",
"B","C","B","B","C","B","B","C","B","C",
"D","A","C","A","C","C","B","C","A","A"
];

// ================= START EXAM =================
let warnings = 3;

function startExam() {
    document.querySelector("button").style.display = "none";
    document.getElementById("quizForm").classList.remove("hidden");

    enterFullscreen();
    renderQuestions();
}

// ================= FULLSCREEN =================
function enterFullscreen() {
    document.documentElement.requestFullscreen();
}

document.addEventListener("fullscreenchange", () => {
    if (!document.fullscreenElement) {
        alert("Fullscreen required!");
        enterFullscreen();
    }
});

// ================= TAB SWITCH DETECTION =================
document.addEventListener("visibilitychange", () => {
    if (document.hidden) {
        warnings--;
        document.getElementById("warningBox").innerText = "Warnings Left: " + warnings;

        alert("⚠️ Do not switch tabs!");

        if (warnings <= 0) {
            submitExam();
        }
    }
});

// ================= DISABLE COPY =================
document.addEventListener("copy", e => e.preventDefault());
document.addEventListener("contextmenu", e => e.preventDefault());

// ================= RENDER QUESTIONS =================
function renderQuestions() {
    const form = document.getElementById("quizForm");

    questions.forEach((q, index) => {
        let div = document.createElement("div");
        div.classList.add("question");

        div.innerHTML = `<p>${index+1}. ${q[0]}</p>
        ${q[1].map(opt =>
            `<label>
                <input type="radio" name="q${index}" value="${opt}"> ${opt}
            </label><br>`
        ).join("")}`;

        form.appendChild(div);
    });

    let submitBtn = document.createElement("button");
    submitBtn.innerText = "Submit Exam";
    submitBtn.type = "button";
    submitBtn.onclick = submitExam;

    form.appendChild(submitBtn);
}

// ================= SUBMIT =================
function submitExam() {
    document.exitFullscreen();

    let score = 0;

    answers.forEach((ans, i) => {
        let selected = document.querySelector(`input[name="q${i}"]:checked`);
        if (selected && selected.value === ans) {
            score++;
        }
    });

    document.getElementById("quizForm").classList.add("hidden");

    const resultDiv = document.getElementById("result");
    resultDiv.classList.remove("hidden");

    resultDiv.innerHTML = `
        <h2>Your Score: ${score} / 30</h2>
        <button onclick="downloadPDF(${score})">Download Result PDF</button>
    `;
}

// ================= PDF DOWNLOAD =================
function downloadPDF(score) {
    const text = `MERN MCQ Test Result\n\nScore: ${score}/30`;

    const blob = new Blob([text], { type: "application/pdf" });
    const link = document.createElement("a");

    link.href = URL.createObjectURL(blob);
    link.download = "your result.pdf";
    link.click();
}
</script>

</body>
</html>
