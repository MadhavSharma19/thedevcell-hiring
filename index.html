<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MERN MCQ Test</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
}

.container {
    max-width: 900px;
    margin: 40px auto;
    padding: 20px;
}

.card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    border-radius: 20px;
    padding: 25px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
}

h1 {
    text-align: center;
    margin-bottom: 20px;
}

.btn {
    display: block;
    margin: 20px auto;
    padding: 12px 25px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(45deg, #22c55e, #4ade80);
    color: black;
    font-weight: 600;
    cursor: pointer;
}

.warning {
    text-align: center;
    margin-bottom: 15px;
    color: #facc15;
}

.question {
    background: rgba(255,255,255,0.07);
    padding: 18px;
    margin-bottom: 15px;
    border-radius: 12px;
}

label {
    display: block;
    padding: 8px;
    cursor: pointer;
}

.result-box {
    text-align: center;
}

.score {
    font-size: 28px;
    margin-bottom: 20px;
    color: #4ade80;
}

.hidden {
    display: none;
}
</style>

</head>

<body>

<div class="container">
<div class="card">

<h1>🚀 MERN MCQ Test</h1>

<p class="warning" id="warningBox">Warnings Left: 3</p>

<button class="btn" onclick="startExam()">Start Test</button>

<form id="quizForm" class="hidden"></form>

<div id="result" class="hidden result-box"></div>

</div>
</div>

<script>

// QUESTIONS
const questions = [

{ question: "Which function is used to take input in Python?", options: ["print()","input()","scan()","read()"]},
{ question: "Which function is used to display output?", options: ["show()","display()","print()","echo()"]},
{ question: "Python is a _____ language.", options: ["Low-level","Machine","High-level","Assembly"]},
{ question: "Which symbol is used for comments in Python?", options: ["//","#","<!-- -->","/* */"]},
{ question: "Which keyword is used to define a variable?", options: ["var","int","No keyword needed","let"]},
{ question: "What is the correct extension of Python files?", options: [".pt",".python",".py",".p"]},
{ question: "Which data type stores text?", options: ["int","float","str","bool"]},
{ question: "Which data type stores True or False?", options: ["bool","str","int","list"]},
{ question: "What will print(2 + 3) output?", options: ["23","5","6","Error"]},
{ question: "What will print(10 - 4) output?", options: ["14","6","10","4"]},

{ question: "What will print(3 * 2) output?", options: ["5","6","32","Error"]},
{ question: "What will print(8 / 2) output?", options: ["4","2","8","16"]},
{ question: "Which operator is used for modulus?", options: ["%","/","//","**"]},
{ question: "What does 10 % 3 return?", options: ["3","1","0","10"]},
{ question: "Which operator is used for power?", options: ["^","**","//","%%"]},
{ question: "What will print(2 ** 3) output?", options: ["6","8","9","5"]},
{ question: "Which operator checks equality?", options: ["=","!=","==","<>"]},
{ question: "Which operator means 'not equal to'?", options: ["<>","!=","==","="]},
{ question: "What will 5 > 3 return?", options: ["True","False","5","3"]},
{ question: "What will 2 < 1 return?", options: ["2","1","True","False"]},

{ question: "Which keyword is used for condition checking?", options: ["check","if","when","loop"]},
{ question: "Which keyword is used for another condition?", options: ["elseif","elif","else if","other"]},
{ question: "Which keyword is used when all conditions are false?", options: ["default","none","else","elif"]},
{ question: "What is indentation used for in Python?", options: ["Decoration","Spacing","Block of code","Comments"]},
{ question: "Which is a correct if statement?", options: ["if x>5","if(x>5):","if x>5:","Both B & C"]},
{ question: "What will happen if indentation is wrong?", options: ["No issue","Indentation Error","Syntax Error","Runtime Error"]},
{ question: "What will print?\nif 5>2:\n print('Hi')", options: ["Hi","Error","Nothing","5"]},
{ question: "Which condition checks even number?", options: ["n % 2 == 1","n % 2 == 0","n / 2 == 0","n == 0"]},
{ question: "Which condition checks odd number?", options: ["n % 2 == 0","n / 2 == 1","n % 2 != 0","n == 1"]},
{ question: "What will this return?\n10 >= 10", options: ["False","10","True","Error"]},

// Assertion Reason
{ question: "Assertion: Python uses indentation\nReason: Indentation defines blocks of code", options: ["A) Both true and reason correct","B) Both true but reason wrong","C) Assertion true reason false","D) Both false"]},

{ question: "Assertion: input() is used for taking input\nReason: print() displays output", options: ["A","B","C","D"]},

{ question: "Assertion: == checks equality\nReason: = is assignment operator", options: ["A","B","C","D"]},

{ question: "Assertion: else runs when if condition is false\nReason: else needs no condition", options: ["A","B","C","D"]},

{ question: "Assertion: 5 % 2 gives remainder\nReason: Modulus operator returns remainder", options: ["A","B","C","D"]},

{ question: "Assertion: Python is case sensitive\nReason: Name and name are different variables", options: ["A","B","C","D"]}

];

const answers = [
"B","C","C","B","C","C","C","A","B","B",
"B","A","A","B","B","B","C","B","A","D",
"B","B","C","C","D","B","A","B","C","C",
"A","A","A","A","A","A"
];
// STATE
let warnings = 3;
let submitted = false;

// START
function startExam() {
    document.querySelector(".btn").style.display = "none";
    document.getElementById("quizForm").classList.remove("hidden");
    renderQuestions();
}

// WARNING SYSTEM
document.addEventListener("visibilitychange", () => {
    if (document.hidden && !submitted) {
        if (warnings > 0) warnings--;
        document.getElementById("warningBox").innerText = "Warnings Left: " + warnings;

        if (warnings === 0) submitExam();
    }
});

// RENDER
function renderQuestions() {
    const form = document.getElementById("quizForm");

    questions.forEach((q, index) => {
        let div = document.createElement("div");
        div.classList.add("question");

        div.innerHTML = `<p>${index+1}. ${q.question}</p>
        ${q.options.map((opt, i) =>
            `<label>
                <input type="radio" name="q${index}" value="${String.fromCharCode(65+i)}">
                ${opt}
            </label>`
        ).join("")}`;

        form.appendChild(div);
    });

    let btn = document.createElement("button");
    btn.innerText = "Submit Exam";
    btn.classList.add("btn");
    btn.type = "button";
    btn.onclick = submitExam;

    form.appendChild(btn);
}

// SUBMIT
function submitExam() {
    if (submitted) return;
    submitted = true;

    let score = 0;

    answers.forEach((ans, i) => {
        let selected = document.querySelector(`input[name="q${i}"]:checked`);
        if (selected && selected.value === ans) score++;
    });

    document.getElementById("quizForm").classList.add("hidden");

    const result = document.getElementById("result");
    result.classList.remove("hidden");

    result.innerHTML = `
        <h2>🎉 Test Completed</h2>
        <div class="score">Score: ${score} / 36</div>
        <button class="btn" onclick="window.location.href='task.html'">Start Test 2</button>
    `;
}

</script>



</body>
</html>
