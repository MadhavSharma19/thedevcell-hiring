<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MERN MCQ Test</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
}

/* Container */
.container {
    max-width: 900px;
    margin: 40px auto;
    padding: 20px;
}

/* Card */
.card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    border-radius: 20px;
    padding: 25px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
}

/* Title */
h1 {
    text-align: center;
    margin-bottom: 20px;
}

/* Button */
.btn {
    display: block;
    margin: 20px auto;
    padding: 12px 25px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(45deg, #22c55e, #4ade80);
    color: black;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
}

/* Warning */
.warning {
    text-align: center;
    margin-bottom: 15px;
    color: #facc15;
}

/* Question */
.question {
    background: rgba(255,255,255,0.07);
    padding: 18px;
    margin-bottom: 15px;
    border-radius: 12px;
    transition: 0.3s;
}

.question:hover {
    background: rgba(255,255,255,0.12);
}

.question p {
    margin-bottom: 10px;
    font-weight: 500;
}

/* Options */
label {
    display: block;
    padding: 8px;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.2s;
}

label:hover {
    background: rgba(255,255,255,0.1);
}

/* Result */
.result-box {
    text-align: center;
}

.score {
    font-size: 28px;
    margin-bottom: 20px;
    color: #4ade80;
}

.hidden {
    display: none;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h1>🚀 MERN MCQ Test</h1>

<p class="warning" id="warningBox">Warnings Left: 3</p>

<button class="btn" onclick="startExam()">Start Test</button>

<form id="quizForm" class="hidden"></form>

<div id="result" class="hidden result-box"></div>

</div>
</div>

<script>
// ================= QUESTIONS =================
const questions = [
"HTML stands for?","Hyperlink tag?","Image tag?","Image path attribute?",
"List item tag?","Largest heading?","Correct HTML structure?","Form tag?",
"Password input type?","Table row tag?","CSS stands for?","Text color property?",
"ID selector?","Background color?","Text size property?","1D layout?",
"Responsive tool?","Default position?","Inner spacing?","Relative unit?",
"Variable keyword?","JS comment?","Select by id?","typeof 'Hello'?",
"Console output?","Click event?","Array syntax?","Strict equality?",
"DOM stands for?","Add to array?"
];

const options = ["A","B","C","D"];

const answers = [
"B","B","A","B","B","C","B","A","B","C",
"B","C","B","B","C","B","B","C","B","C",
"D","A","C","A","C","C","B","C","A","A"
];

// ================= START =================
let warnings = 3;

function startExam() {
    document.querySelector(".btn").style.display = "none";
    document.getElementById("quizForm").classList.remove("hidden");

    enterFullscreen();
    renderQuestions();
}

// ================= FULLSCREEN =================
function enterFullscreen() {
    document.documentElement.requestFullscreen();
}

document.addEventListener("fullscreenchange", () => {
    if (!document.fullscreenElement) {
        alert("⚠️ Fullscreen required!");
        enterFullscreen();
    }
});

// ================= TAB SWITCH =================
document.addEventListener("visibilitychange", () => {
    if (document.hidden) {
        warnings--;
        document.getElementById("warningBox").innerText = "Warnings Left: " + warnings;

        alert("⚠️ Do not switch tabs!");

        if (warnings <= 0) submitExam();
    }
});

// ================= DISABLE CHEATS =================
document.addEventListener("contextmenu", e => e.preventDefault());
document.addEventListener("copy", e => e.preventDefault());

// ================= RENDER =================
function renderQuestions() {
    const form = document.getElementById("quizForm");

    questions.forEach((q, index) => {
        let div = document.createElement("div");
        div.classList.add("question");

        div.innerHTML = `<p>${index+1}. ${q}</p>
        ${options.map(opt =>
            `<label>
                <input type="radio" name="q${index}" value="${opt}"> ${opt}
            </label>`
        ).join("")}`;

        form.appendChild(div);
    });

    let btn = document.createElement("button");
    btn.innerText = "Submit Exam";
    btn.classList.add("btn");
    btn.type = "button";
    btn.onclick = submitExam;

    form.appendChild(btn);
}

// ================= SUBMIT =================
function submitExam() {
    document.exitFullscreen();

    let score = 0;

    answers.forEach((ans, i) => {
        let selected = document.querySelector(`input[name="q${i}"]:checked`);
        if (selected && selected.value === ans) score++;
    });

    document.getElementById("quizForm").classList.add("hidden");

    const result = document.getElementById("result");
    result.classList.remove("hidden");

    result.innerHTML = `
        <h2>🎉 Test Completed</h2>
        <div class="score">Score: ${score} / 30</div>
        <button class="btn" onclick="downloadPDF(${score})">Download Result</button>
    `;
}

// ================= PDF =================
function downloadPDF(score) {
    const text = `MERN MCQ Test Result\nScore: ${score}/30`;
    const blob = new Blob([text], { type: "application/pdf" });

    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "result.pdf";
    link.click();
}
</script>

</body>
</html>
