<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MERN MCQ Test</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
}

.container {
    max-width: 900px;
    margin: 40px auto;
    padding: 20px;
}

.card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    border-radius: 20px;
    padding: 25px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
}

h1 {
    text-align: center;
    margin-bottom: 20px;
}

.btn {
    display: block;
    margin: 20px auto;
    padding: 12px 25px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(45deg, #22c55e, #4ade80);
    color: black;
    font-weight: 600;
    cursor: pointer;
}

.warning {
    text-align: center;
    margin-bottom: 15px;
    color: #facc15;
}

.question {
    background: rgba(255,255,255,0.07);
    padding: 18px;
    margin-bottom: 15px;
    border-radius: 12px;
}

label {
    display: block;
    padding: 8px;
    cursor: pointer;
}

.result-box {
    text-align: center;
}

.score {
    font-size: 28px;
    margin-bottom: 20px;
    color: #4ade80;
}

.hidden {
    display: none;
}
</style>

</head>

<body>

<div class="container">
<div class="card">

<h1>🚀 MERN MCQ Test</h1>

<p class="warning" id="warningBox">Warnings Left: 3</p>

<button class="btn" onclick="startExam()">Start Test</button>

<form id="quizForm" class="hidden"></form>

<div id="result" class="hidden result-box"></div>

</div>
</div>

<script>

// QUESTIONS
const questions = [
{ question: "What does HTML stand for?", options: ["Hyper Trainer Marking Language","Hyper Text Markup Language","Hyper Text Marketing Language","Hyper Tool Markup Language"]},
{ question: "Which tag is used to create a hyperlink?", options: ["&lt;link&gt;","&lt;a&gt;","&lt;href&gt;","&lt;url&gt;"]},
{ question: "Which tag is used for inserting an image?", options: ["&lt;img&gt;","&lt;image&gt;","&lt;src&gt;","&lt;pic&gt;"]},
{ question: "Which attribute is used in &lt;img&gt; tag?", options: ["link","src","href","path"]},
{ question: "Which tag is used to create a list item?", options: ["&lt;ul&gt;","&lt;li&gt;","&lt;ol&gt;","&lt;list&gt;"]},
{ question: "Largest heading tag?", options: ["&lt;h6&gt;","&lt;heading&gt;","&lt;h1&gt;","&lt;head&gt;"]},
{ question: "Correct HTML structure?", options: ["&lt;head&gt;&lt;html&gt;&lt;body&gt;","&lt;html&gt;&lt;head&gt;&lt;body&gt;","&lt;html&gt;&lt;body&gt;&lt;head&gt;","&lt;body&gt;&lt;html&gt;&lt;head&gt;"]},
{ question: "Which tag is used to create a form?", options: ["&lt;form&gt;","&lt;input&gt;","&lt;button&gt;","&lt;submit&gt;"]},
{ question: "Password input type?", options: ["text","password","hidden","secure"]},
{ question: "Table row tag?", options: ["&lt;td&gt;","&lt;th&gt;","&lt;tr&gt;","&lt;row&gt;"]},

{ question: "What does CSS stand for?", options: ["Creative Style Sheets","Cascading Style Sheets","Computer Style Sheets","Colorful Style Sheets"]},
{ question: "Text color property?", options: ["font-color","text-color","color","text-style"]},
{ question: "ID selector?", options: [".box","#box","box","*box"]},
{ question: "Background color property?", options: ["bg-color","background-color","color-bg","bgcolor"]},
{ question: "Text size property?", options: ["font-style","text-size","font-size","size"]},
{ question: "1D layout?", options: ["Grid","Flexbox","Float","Inline"]},
{ question: "Responsive tool?", options: ["display","media queries","position","float"]},
{ question: "Default position?", options: ["relative","absolute","static","fixed"]},
{ question: "Inner spacing?", options: ["margin","padding","border","spacing"]},
{ question: "Relative unit?", options: ["px","cm","em","mm"]},

{ question: "Variable keyword?", options: ["var","let","const","All of the above"]},
{ question: "JS comment?", options: ["//","&lt;!-- --&gt;","##","**"]},
{ question: "Select by id?", options: ["getElement()","querySelector()","getElementById()","selectId()"]},
{ question: "typeof 'Hello'?", options: ["string","text","object","char"]},
{ question: "Console output?", options: ["print()","log()","console.log()","display()"]},
{ question: "Click event?", options: ["onhover","onchange","onclick","onmouse"]},
{ question: "Array syntax?", options: ["{}","[]","()","&lt;&gt;"]},
{ question: "Strict equality?", options: ["==","=","===","!="]},
{ question: "DOM stands for?", options: ["Document Object Model","Data Object Model","Digital Object Model","Document Oriented Model"]},
{ question: "Add to array?", options: ["push()","pop()","shift()","add()"]}
];

// ANSWERS
const answers = [
"B","B","A","B","B","C","B","A","B","C",
"B","C","B","B","C","B","B","C","B","C",
"D","A","C","A","C","C","B","C","A","A"
];

// STATE
let warnings = 3;
let submitted = false;

// START
function startExam() {
    document.querySelector(".btn").style.display = "none";
    document.getElementById("quizForm").classList.remove("hidden");
    renderQuestions();
}

// WARNING SYSTEM
document.addEventListener("visibilitychange", () => {
    if (document.hidden && !submitted) {
        if (warnings > 0) warnings--;
        document.getElementById("warningBox").innerText = "Warnings Left: " + warnings;

        if (warnings === 0) submitExam();
    }
});

// RENDER
function renderQuestions() {
    const form = document.getElementById("quizForm");

    questions.forEach((q, index) => {
        let div = document.createElement("div");
        div.classList.add("question");

        div.innerHTML = `<p>${index+1}. ${q.question}</p>
        ${q.options.map((opt, i) =>
            `<label>
                <input type="radio" name="q${index}" value="${String.fromCharCode(65+i)}">
                ${String.fromCharCode(65+i)}. ${opt}
            </label>`
        ).join("")}`;

        form.appendChild(div);
    });

    let btn = document.createElement("button");
    btn.innerText = "Submit Exam";
    btn.classList.add("btn");
    btn.type = "button";
    btn.onclick = submitExam;

    form.appendChild(btn);
}

// SUBMIT
function submitExam() {
    if (submitted) return;
    submitted = true;

    let score = 0;

    answers.forEach((ans, i) => {
        let selected = document.querySelector(`input[name="q${i}"]:checked`);
        if (selected && selected.value === ans) score++;
    });

    document.getElementById("quizForm").classList.add("hidden");

    const result = document.getElementById("result");
    result.classList.remove("hidden");

    result.innerHTML = `
        <h2>🎉 Test Completed</h2>
        <div class="score">Score: ${score} / 30</div>
        <button class="btn" onclick="window.location.href='test2.html'">Start Test 2</button>
    `;
}

</script>

</body>
</html>
