<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Task Assignment</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    height: 100vh;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
}

.container {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    width: 420px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
}

h1 {
    margin-bottom: 10px;
}

p {
    margin-bottom: 25px;
    color: #94a3b8;
}

.btn {
    display: block;
    width: 100%;
    margin: 10px 0;
    padding: 14px;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
    background: linear-gradient(45deg, #f59e0b, #fbbf24);
    color: black;
}

.btn:hover {
    transform: scale(1.05);
}

.footer {
    margin-top: 20px;
    font-size: 12px;
    color: #64748b;
}
</style>

</head>

<body>

<div class="container">

<h1>📝 Task Assignment</h1>
<p>Complete the task provided in the PDF below</p>

<button class="btn" onclick="openTask()">📄 Open Task PDF</button>

<div class="footer">Marshall Testing System</div>

</div>

<script>
function openTask() {
    window.open("TASK.pdf", "_blank");
}
</script>

</body>
</html>
