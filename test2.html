<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Test 2 - Select Set</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    height: 100vh;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
}

/* Main Card */
.container {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    width: 400px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
}

h1 {
    margin-bottom: 10px;
}

p {
    margin-bottom: 30px;
    color: #94a3b8;
}

/* Buttons */
.btn {
    display: block;
    width: 100%;
    margin: 10px 0;
    padding: 14px;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
}

/* Set 1 */
.set1 {
    background: linear-gradient(45deg, #3b82f6, #60a5fa);
}

/* Set 2 */
.set2 {
    background: linear-gradient(45deg, #22c55e, #4ade80);
}

.btn:hover {
    transform: scale(1.05);
}

/* Footer */
.footer {
    margin-top: 20px;
    font-size: 12px;
    color: #64748b;
}
</style>

</head>

<body>

<div class="container">

<h1>📘 Test 2</h1>
<p>Select your question paper set</p>

<button class="btn set1" onclick="openPDF('set1.pdf')">📄 Open Set 1</button>
<button class="btn set2" onclick="openPDF('set2.pdf')">📄 Open Set 2</button>

<div class="footer">Marshall Testing System</div>

</div>

<script>
function openPDF(file) {
    window.open(file, "_blank");
}
</script>

</body>
</html>
